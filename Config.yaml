#!name=Прокси (Белый список)
#!desc=Всё через прокси, кроме сайтов из белого списка

# =========================================================
# ⚙️ НАСТРОЙКИ КОНФИГУРАЦИИ (МЕНЯТЬ ТОЛЬКО ЭТОТ БЛОК)
# =========================================================
x-variables:
  # 1. Ссылки на подписку и правила
  sub_url: &sub_url "ВСТАВЬТЕ_ССЫЛКУ_НА_ВАШИ_СЕРВЕРА"
  rule_url: &rule_url "ВСТАВЬТЕ_ССЫЛКУ_НА_GITHUB_RAW_YAML"

  # 2. Таймеры обновлений (В секундах. Поставьте 0, чтобы ПОЛНОСТЬЮ ОТКЛЮЧИТЬ)
  update_interval: &update_interval 86400  # Обновление серверов и правил (86400 = 1 раз в сутки)
  ping_interval: &ping_interval 300        # Проверка пинга серверов (300 = раз в 5 минут)
  
  # 3. Чувствительность переключения (В миллисекундах)
  ping_tolerance: &ping_tolerance 50       # Не переключать сервер, если разница пинга меньше 50мс
# =========================================================

port: 7890
allow-lan: false
mode: rule
log-level: warning
ipv6: false

tun:
  enable: true
  stack: mixed
  auto-route: true
  dns-hijack: ["any:53"]

dns:
  enable: true
  listen: 0.0.0.0:1053
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  nameserver:
    - 1.1.1.1
    - 8.8.8.8

proxy-providers:
  my-servers:
    type: http
    url: *sub_url
    interval: *update_interval
    health-check:
      enable: true
      url: http://cp.cloudflare.com/generate_204
      interval: *ping_interval

proxy-groups:
  - name: "Auto"
    type: url-test
    use:
      - my-servers
    url: http://cp.cloudflare.com/generate_204
    interval: *ping_interval
    tolerance: *ping_tolerance

rule-providers:
  whitelist:
    type: http
    behavior: classical
    format: yaml   
    url: *rule_url
    interval: *update_interval

rules:
  # 1. Локальная сеть напрямую
  - GEOIP,lan,DIRECT,no-resolve
  - GEOSITE,private,DIRECT

  # 2. Сайты из вашего Github -> НАПРЯМУЮ
  - RULE-SET,whitelist,DIRECT

  # 3. ВСЁ ОСТАЛЬНОЕ -> В ПРОКСИ
  - MATCH,Auto