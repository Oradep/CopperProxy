# ================= ПЕРЕМЕННЫЕ (ВСТАВЛЯТЬ ССЫЛКИ СЮДА) =================
# Эти переменные автоматически подставятся в нужные места ниже.
x-variables:
  personal_sub: &personal_sub "https://..." # <<< ССЫЛКА НА СВОЙ ОСНОВНОЙ СЕРВЕР
  backup_sub: &backup_sub "https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/refs/heads/main/Vless-Reality-White-Lists-Rus-Mobile.txt" # <<< ССЫЛКА НА СЕРВЕР ДЛЯ ОБХОДА БЛ
  blacklist_url: &blacklist_url "https://raw.githubusercontent.com/Oradep/CopperProxy/refs/heads/main/blacklist_mihomo.yaml"
  whitelist_url: &whitelist_url "https://raw.githubusercontent.com/Oradep/CopperProxy/refs/heads/main/whitelist_mihomo.yaml"


# ================= ОСНОВНЫЕ НАСТРОЙКИ =================
port: 7890
allow-lan: false
mode: rule
log-level: info
ipv6: false
udp: true  # <--- ВКЛЮЧЕНО ДЛЯ РАБОТЫ ГОЛОСА В DISCORD, WHATSAPP, ТЕЛЕГРАМЕ

# ================= СНИФФЕР И DNS =================
sniffer:
  enable: true
  parse-pure-ip: true
  sniff:
    TLS:
      ports: [443, 8443]
    HTTP:
      ports: [80, 8080-8880]

dns:
  enable: true
  listen: 0.0.0.0:1053
  ipv6: false
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter:
    - '+.lan'
    - '+.local'
    - '+.ru'          # Не подменять IP для ру-сегмента
    - '+.discord.gg'  # Исключение для Дискорда (чтобы не ломались войсы)
    - '+.discord.com' # Исключение для Дискорда
  default-nameserver:
    - 77.88.8.8
  nameserver:
    - 77.88.8.8
  nameserver-policy:
    "+.ru": "77.88.8.8"
    "+.рф": "77.88.8.8"

# ================= 1. ПОДПИСКИ (ПРОВАЙДЕРЫ ПРОКСИ) =================
proxy-providers:
  # Основной сервер
  main-personal-sub:
    type: http
    url: *personal_sub  # <--- Ссылка берется из переменных
    interval: 3600
    health-check:
      enable: true
      url: "http://cp.cloudflare.com/generate_204"
      expected-status: 204
      interval: 30

  # Резервные сервера
  public-backup-subs:
    type: http
    url: *backup_sub  # <--- Ссылка берется из переменных
    interval: 3600 
    exclude-filter: "🇷🇺|RU |Russia|UFO|Timeweb|Yandex|VK|CDNvideo|YA" 
    health-check:
      enable: true
      url: "http://cp.cloudflare.com/generate_204"
      expected-status: 204 
      interval: 120

# ================= 2. ЛОГИКА ГРУПП =================
proxy-groups:
  # Резервная сеть
  - name: "Public-Backup"
    type: url-test
    use:
      - public-backup-subs
    url: "http://cp.cloudflare.com/generate_204"
    expected-status: 204
    interval: 60
    tolerance: 100

  # VPN-Сеть (Сначала пытается через Ваш сервер, если он лежит - кидает на Резерв)
  - name: "Smart-Routing"
    type: fallback
    use:
      - main-personal-sub
    proxies:
      - "Public-Backup"
    url: "http://cp.cloudflare.com/generate_204"
    expected-status: 204
    interval: 15

  # === МАГИЧЕСКИЙ АВТО-ПЕРЕКЛЮЧАТЕЛЬ ===
  - name: "Auto-State"
    type: fallback
    proxies:
      - DIRECT
      - "Smart-Routing"
    url: "http://cp.cloudflare.com/generate_204"
    expected-status: 204
    interval: 15

# ================= 3. СПИСКИ ДОМЕНОВ (GITHUB) =================
rule-providers:
  sanmai-blacklist:
    type: http
    behavior: classical
    format: yaml   
    url: *blacklist_url  # <--- Ссылка берется из переменных
    interval: 86400 

  sanmai-whitelist:
    type: http
    behavior: classical
    format: yaml   
    url: *whitelist_url  # <--- Ссылка берется из переменных
    interval: 86400 

# ================= 4. МАРШРУТИЗАЦИЯ =================
rules:
  # 1. Локалка и роутер - всегда напрямую
  - GEOIP,lan,DIRECT,no-resolve
  - GEOSITE,private,DIRECT

  # 2. РУССКИЕ САЙТЫ (Белый список) - ВСЕГДА НАПРЯМУЮ в любом состоянии
  - RULE-SET,sanmai-whitelist,DIRECT

  # 3. Служебные домены (чтобы VPN не зависал)
  - DOMAIN-KEYWORD,github,Smart-Routing
  - DOMAIN-KEYWORD,ipwho,Smart-Routing
  - DOMAIN-KEYWORD,ipinfo,Smart-Routing
  - DOMAIN-KEYWORD,ipapi,Smart-Routing

  # 4. ЗАБЛОКИРОВАННЫЕ САЙТЫ И ИИ (Черный список) - ВСЕГДА ЧЕРЕЗ VPN
  - GEOSITE,telegram,Smart-Routing
  - GEOIP,telegram,Smart-Routing
  - DOMAIN-KEYWORD,google,Smart-Routing
  - DOMAIN-SUFFIX,gstatic.com,Smart-Routing
  - DOMAIN-SUFFIX,googleapis.com,Smart-Routing
  - DOMAIN-SUFFIX,ggpht.com,Smart-Routing
  - RULE-SET,sanmai-blacklist,Smart-Routing

  # 5. ВСЁ ОСТАЛЬНОЕ -> ИДЁТ В АВТО-ПЕРЕКЛЮЧАТЕЛЬ
  - MATCH,Auto-State