# ================= ОСНОВНЫЕ НАСТРОЙКИ =================
port: 7890
allow-lan: false
mode: rule
log-level: info
ipv6: false

# ================= СНИФФЕР И DNS =================
sniffer:
  enable: true
  parse-pure-ip: true
  sniff:
    TLS:
      ports: [443, 8443]
    HTTP:
      ports: [80, 8080-8880]

dns:
  enable: true
  listen: 0.0.0.0:1053
  ipv6: false
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter:
    - '+.lan'
    - '+.local'
  default-nameserver:
    - 77.88.8.8
    - 77.88.8.1
  nameserver:
    - https://dns.yandex.ru/dns-query
    - 77.88.8.8
  nameserver-policy:
    "+.ru": "77.88.8.8"
    "+.su": "77.88.8.8"
    "+.рф": "77.88.8.8"

# ================= 1. ПОДПИСКИ (ПРОВАЙДЕРЫ ПРОКСИ) =================
proxy-providers:
  # 1.1 Ваша личная подписка 3x-ui (ОСНОВНАЯ)
  main-personal-sub:
    type: http
    url: "https://...:2096/sub/" # ВАЖНО: Вставьте сюда ваш полный URL 3x-ui
    interval: 3600
    health-check:
      enable: true
      url: "http://www.gstatic.com/generate_204"
      interval: 60

  # 1.2 Публичные сервера (РЕЗЕРВ)
  public-backup-subs:
    type: http
    url: "https://raw.githubusercontent.com/Oradep/UltimateProxy/refs/heads/main/vless_wl.txt"
    interval: 3600 
    # Отсекаем все сервера из РФ
    exclude-filter: "🇷🇺|RU |Russia|UFO|Timeweb|Yandex|VK|CDNvideo" 
    health-check:
      enable: true
      url: "http://www.gstatic.com/generate_204"
      interval: 300

# ================= 2. ЛОГИКА ГРУПП =================
proxy-groups:
  - name: "My-Main-Node"
    type: url-test
    use:
      - main-personal-sub
    url: "http://www.gstatic.com/generate_204"
    interval: 60

  - name: "Public-Backup"
    type: url-test
    use:
      - public-backup-subs
    url: "http://www.gstatic.com/generate_204"
    interval: 300
    tolerance: 100

  - name: "Smart-Routing"
    type: fallback
    proxies:
      - "My-Main-Node"
      - "Public-Backup"
    url: "http://www.gstatic.com/generate_204"
    interval: 30

# ================= 3. СПИСКИ ДОМЕНОВ (GITHUB) =================
rule-providers:
  sanmai-blacklist:
    type: http
    behavior: classical
    format: yaml   
    url: "https://raw.githubusercontent.com/Oradep/CopperProxy/refs/heads/main/blacklist_mihomo.yaml"
    interval: 86400 

  # ПОДКЛЮЧАЕМ ВАШ БЕЛЫЙ СПИСОК
  sanmai-whitelist:
    type: http
    behavior: classical
    format: yaml   
    url: "https://raw.githubusercontent.com/Oradep/CopperProxy/refs/heads/main/whitelist_mihomo.yaml" # Замените ссылку на ту, где будет лежать файл
    interval: 86400 

# ================= 4. МАРШРУТИЗАЦИЯ =================
rules:
  # 1. Локальная сеть
  - GEOIP,lan,DIRECT,no-resolve
  - GEOSITE,private,DIRECT

  # 2. Жизненно важные правила для работы клиента FlClash
  - DOMAIN-KEYWORD,ipwho,Smart-Routing
  - DOMAIN-KEYWORD,myip,Smart-Routing
  - DOMAIN-KEYWORD,ipapi,Smart-Routing
  - DOMAIN-KEYWORD,ident.me,Smart-Routing
  - DOMAIN-KEYWORD,ipinfo,Smart-Routing

  # 3. >>> БЕЛЫЕ СПИСКИ (RU СЕРВИСЫ) ИДУТ НАПРЯМУЮ <<<
  - RULE-SET,sanmai-whitelist,DIRECT

  # 4. GitHub (чтобы подписки обновлялись даже при блоках)
  - DOMAIN-SUFFIX,githubusercontent.com,Smart-Routing
  - DOMAIN-SUFFIX,github.com,Smart-Routing

  # 5. TELEGRAM (Гарантированная работа)
  - GEOSITE,telegram,Smart-Routing
  - GEOIP,telegram,Smart-Routing

  # 6. GOOGLE & GEMINI & AI (Гарантированная работа)
  - DOMAIN-SUFFIX,gemini.google.com,Smart-Routing
  - DOMAIN-KEYWORD,google,Smart-Routing
  - DOMAIN-SUFFIX,googleapis.com,Smart-Routing
  - DOMAIN-SUFFIX,gstatic.com,Smart-Routing
  - DOMAIN-SUFFIX,appspot.com,Smart-Routing
  - DOMAIN-SUFFIX,ggpht.com,Smart-Routing
  - DOMAIN-SUFFIX,openai.com,Smart-Routing
  - DOMAIN-SUFFIX,ai.com,Smart-Routing
  - DOMAIN-SUFFIX,oaistatic.com,Smart-Routing
  - DOMAIN-SUFFIX,oaiusercontent.com,Smart-Routing

  # 7. ЧЕРНЫЙ СПИСОК (Идет через VPN)
  - RULE-SET,sanmai-blacklist,Smart-Routing

  # 8. ВЕСЬ ОСТАЛЬНОЙ ТРАФИК ИДЕТ НАПРЯМУЮ
  - MATCH,DIRECT