# ================= ОСНОВНЫЕ НАСТРОЙКИ =================
port: 7890
allow-lan: false
mode: rule
log-level: info
ipv6: false

# ================= СНИФФЕР И DNS =================
sniffer:
  enable: true
  parse-pure-ip: true
  sniff:
    TLS:
      ports: [443, 8443]
    HTTP:
      ports: [80, 8080-8880]

dns:
  enable: true
  listen: 0.0.0.0:1053
  ipv6: false
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter:
    - '+.lan'
    - '+.local'
  default-nameserver:
    - 77.88.8.8
  nameserver:
    - https://1.1.1.1/dns-query
    - https://8.8.8.8/dns-query
  nameserver-policy:
    "+.ru": "77.88.8.8"
    "+.su": "77.88.8.8"
    "+.рф": "77.88.8.8"
    "+.yandex.ru": "77.88.8.8"
    "+.vk.com": "77.88.8.8"
    "+.ya.ru": "77.88.8.8"

# ================= 1. MAIN VLESS (ДВА ВАРИАНТА ПОДКЛЮЧЕНИЯ) =================
proxies:
  # 1.1 Прямое подключение
  - name: "Main-VLESS"
    type: vless
    server: -
    port: 443
    uuid: -
    network: tcp
    tls: true
    udp: true
    flow: xtls-rprx-vision
    servername: vk.com
    reality-opts:
      public-key: -
      short-id: -
    client-fingerprint: chrome

  # 1.2 Подключение через цепочку
  - name: "Main-VLESS-Chained"
    type: vless
    server: -
    port: 443
    uuid: -
    network: tcp
    tls: true
    udp: true
    flow: xtls-rprx-vision
    servername: vk.com
    reality-opts:
      public-key: -
      short-id: -
    client-fingerprint: chrome
    dialer-proxy: "Best-Whitelist-Proxy"

# ================= 2. ПОДПИСКИ (БЕЛЫЕ СЕРВЕРА) =================
proxy-providers:
  github-whitelist-subs:
    type: http
    url: "https://raw.githubusercontent.com/Oradep/UltimateProxy/refs/heads/main/vless_wl.txt"
    interval: 3600 
    health-check:
      enable: true
      url: http://cp.cloudflare.com/generate_204
      interval: 300

# ================= 3. ЛОГИКА =================
proxy-groups:
  - name: "Best-Whitelist-Proxy"
    type: url-test
    use:
      - github-whitelist-subs
    url: http://cp.cloudflare.com/generate_204
    interval: 300 
    tolerance: 50 

  - name: "Smart-Routing"
    type: fallback
    proxies:
      - "Main-VLESS"          
      - "Main-VLESS-Chained"  
    url: http://cp.cloudflare.com/generate_204
    interval: 10 

# ================= 4. БЛЭКЛИСТЫ =================
rule-providers:
  sanmai-blacklist:
    type: http
    behavior: classical
    format: yaml   
    url: "https://raw.githubusercontent.com/Oradep/CopperProxy/refs/heads/main/blacklist_mihomo.yaml"
    interval: 86400 

# ================= 5. МАРШРУТИЗАЦИЯ =================
rules:
  # 1. Локалка идет напрямую
  - GEOIP,lan,DIRECT,no-resolve
  - GEOSITE,private,DIRECT

  # 2. ФИКС ДЛЯ GEMINI И GOOGLE (Обязательно через VPN)
  - DOMAIN-KEYWORD,google,Smart-Routing
  - DOMAIN-SUFFIX,googleapis.com,Smart-Routing
  - DOMAIN-SUFFIX,gstatic.com,Smart-Routing
  - DOMAIN-SUFFIX,appspot.com,Smart-Routing
  - DOMAIN-SUFFIX,openai.com,Smart-Routing
  - DOMAIN-SUFFIX,ai.com,Smart-Routing

  # 3. Проверка по блэклисту
  - RULE-SET,sanmai-blacklist,Smart-Routing

  # 4. Всё остальное напрямую (включая весь рунет)
  - MATCH,DIRECT