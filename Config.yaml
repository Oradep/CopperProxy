# ================= ОСНОВНЫЕ НАСТРОЙКИ =================
port: 7890
allow-lan: false
mode: rule
log-level: info
ipv6: false

# ================= СНИФФЕР И DNS =================
sniffer:
  enable: true
  parse-pure-ip: true
  sniff:
    TLS:
      ports: [443, 8443]
    HTTP:
      ports: [80, 8080-8880]

dns:
  enable: true
  listen: 0.0.0.0:1053
  ipv6: false
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter:
    - '+.lan'
    - '+.local'
  default-nameserver:
    - 77.88.8.8
  nameserver:
    - 77.88.8.8
  nameserver-policy:
    "+.ru": "77.88.8.8"
    "+.рф": "77.88.8.8"

# ================= 1. ПОДПИСКИ (ПРОВАЙДЕРЫ ПРОКСИ) =================
proxy-providers:
  # Основной сервер
  main-personal-sub:
    type: http
    url: "https://...:2096/sub/ВАШ_КОД" # <<< ВСТАВЬТЕ СЮДА ВАШУ ССЫЛКУ 3X-UI
    interval: 3600
    health-check:
      enable: true
      url: "http://cp.cloudflare.com/generate_204"
      expected-status: 204
      interval: 30

  # Резервные сервера
  public-backup-subs:
    type: http
    url: "https://raw.githubusercontent.com/Oradep/UltimateProxy/refs/heads/main/vless_wl.txt"
    interval: 3600 
    exclude-filter: "🇷🇺|RU |Russia|UFO|Timeweb|Yandex|VK|CDNvideo|YA" 
    health-check:
      enable: true
      url: "http://cp.cloudflare.com/generate_204"
      expected-status: 204 
      interval: 120

# ================= 2. ЛОГИКА ГРУПП =================
proxy-groups:
  # Резервная сеть
  - name: "Public-Backup"
    type: url-test
    use:
      - public-backup-subs
    url: "http://cp.cloudflare.com/generate_204"
    expected-status: 204
    interval: 60
    tolerance: 100

  # VPN-Сеть (Сначала пытается через Ваш сервер, если он лежит - кидает на Резерв)
  - name: "Smart-Routing"
    type: fallback
    use:
      - main-personal-sub
    proxies:
      - "Public-Backup"
    url: "http://cp.cloudflare.com/generate_204"
    expected-status: 204
    interval: 15

  # === МАГИЧЕСКИЙ АВТО-ПЕРЕКЛЮЧАТЕЛЬ ===
  # Каждые 15 сек проверяет глобальный интернет. Если работает -> DIRECT. Если заглушка провайдера -> кидает в VPN.
  - name: "Auto-State"
    type: fallback
    proxies:
      - DIRECT
      - "Smart-Routing"
    url: "http://cp.cloudflare.com/generate_204"
    expected-status: 204
    interval: 15

# ================= 3. СПИСКИ ДОМЕНОВ (GITHUB) =================
rule-providers:
  sanmai-blacklist:
    type: http
    behavior: classical
    format: yaml   
    url: "https://raw.githubusercontent.com/Oradep/CopperProxy/refs/heads/main/blacklist_mihomo.yaml"
    interval: 86400 

  sanmai-whitelist:
    type: http
    behavior: classical
    format: yaml   
    url: "https://raw.githubusercontent.com/Oradep/CopperProxy/refs/heads/main/whitelist_mihomo.yaml" # <<< ВСТАВЬТЕ СЮДА ССЫЛКУ НА БЕЛЫЙ СПИСОК
    interval: 86400 

# ================= 4. МАРШРУТИЗАЦИЯ =================
rules:
  # 1. Локалка и роутер - всегда напрямую
  - GEOIP,lan,DIRECT,no-resolve
  - GEOSITE,private,DIRECT

  # 2. РУССКИЕ САЙТЫ (Белый список) - ВСЕГДА НАПРЯМУЮ в любом состоянии
  - RULE-SET,sanmai-whitelist,DIRECT

  # 3. Служебные домены (чтобы VPN не зависал)
  - DOMAIN-KEYWORD,github,Smart-Routing
  - DOMAIN-KEYWORD,ipwho,Smart-Routing
  - DOMAIN-KEYWORD,ipinfo,Smart-Routing
  - DOMAIN-KEYWORD,ipapi,Smart-Routing

  # 4. ЗАБЛОКИРОВАННЫЕ САЙТЫ И ИИ (Черный список + Гугл/Телега) - ВСЕГДА ЧЕРЕЗ VPN
  - GEOSITE,telegram,Smart-Routing
  - GEOIP,telegram,Smart-Routing
  - DOMAIN-KEYWORD,google,Smart-Routing
  - DOMAIN-SUFFIX,gstatic.com,Smart-Routing
  - DOMAIN-SUFFIX,googleapis.com,Smart-Routing
  - DOMAIN-SUFFIX,ggpht.com,Smart-Routing
  - DOMAIN-SUFFIX,openai.com,Smart-Routing
  - DOMAIN-SUFFIX,ai.com,Smart-Routing
  - DOMAIN-SUFFIX,oaistatic.com,Smart-Routing
  - RULE-SET,sanmai-blacklist,Smart-Routing

  # 5. ВСЁ ОСТАЛЬНОЕ (Pinterest, игры и т.д.) -> ИДЁТ В АВТО-ПЕРЕКЛЮЧАТЕЛЬ
  # Если режим черных списков: пойдет напрямую. Если режим белых списков: пойдет через VPN.
  - MATCH,Auto-State